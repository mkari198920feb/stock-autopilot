# Publisher mode: illustrative model portfolios for friends (not personalized advice)
model_portfolios:
  benchmark: SPY
  disclaimer: >
    Research publisher only — illustrative model portfolios, not personalized advice.
    Pick a model that fits your own risk tolerance. You trade in your own brokerage account.
  models:
    conservative:
      label: Conservative
      description: Lower volatility, quality and income tilt. Higher cash in Risk-Off regimes.
      holdings: 6
      max_single_weight: 0.20
      base_cash_pct: 0.10
      max_volatility: 0.22
      max_per_sector: 2
      max_per_region: 2
      prefer_sectors:
        - Healthcare
        - Financial Services
        - Consumer Defensive
        - Utilities
      prefer_symbols:
        - SPY
        - JNJ
        - V
        - UNH
      scoring_bias:
        volatility_fit: 0.30
        momentum: 0.15
        valuation: 0.20
    balanced:
      label: Balanced
      description: Global core book — diversified regions, sectors, and themes.
      holdings: 8
      max_single_weight: 0.15
      base_cash_pct: 0.05
      max_per_sector: 2
      max_per_region: 3
    growth:
      label: Growth
      description: Momentum and innovation tilt. Higher volatility tolerance.
      holdings: 6
      max_single_weight: 0.18
      base_cash_pct: 0.05
      min_momentum_3m: 0.0
      max_per_sector: 2
      max_per_region: 3
      prefer_sectors:
        - Technology
        - Communication Services
        - Consumer Cyclical
      scoring_bias:
        momentum: 0.35
        valuation: 0.10
        volatility_fit: 0.15
