# Your return goal — used for scoring & UI (override via dashboard or .env)
investor_profile:
  target_min_pct: 12
  target_max_pct: 15
  # Alternative: single target with ± band
  # target_pct: 15
  # band_width_pct: 3

# Brand & research persona (UI, notes, email subject)
apex:
  brand_name: LUMIQ
  brand_short: "◈"
  brand_tagline: Global markets · Research autopilot
  firm_name: LUMIQ Research Desk
  global_platform_name: LUMIQ
  role: Chief Investment Strategist · Equity Research
  tagline: Institutional-grade equity research across every risk profile
  powered_by: LUMIQ

# APEX Deep Intelligence — stock detail engine + live market pulse boards
apex_deep:
  enabled: true
  pulse_refresh_cron: "10,40 * * * *"
  auto_deep_on_pick_click: true

# APEX Crypto Desk — hourly BTC/ETH pulse (public data proxies)
crypto_pulse:
  enabled: true
  assets:
    - BTC
    - ETH
  refresh_cron: "5 * * * *"
  weights:
    on_chain: 0.25
    derivatives: 0.25
    macro: 0.20
    sentiment: 0.15
    microstructure: 0.10
    session_timing: 0.05

# APEX Commodities Desk — futures, energy, metals, ag proxies
commodities_desk:
  enabled: true
  refresh_cron: "15 * * * *"
  desk_picks: 6
  categories:
    precious:
      label: "Precious Metals"
      symbols:
        - {symbol: "GC=F", name: "Gold", unit: "$/oz"}
        - {symbol: "SI=F", name: "Silver", unit: "$/oz"}
    energy:
      label: "Energy"
      symbols:
        - {symbol: "CL=F", name: "WTI Crude", unit: "$/bbl"}
        - {symbol: "BZ=F", name: "Brent Crude", unit: "$/bbl"}
        - {symbol: "NG=F", name: "Natural Gas", unit: "$/MMBtu"}
    industrial:
      label: "Industrial Metals"
      symbols:
        - {symbol: "HG=F", name: "Copper", unit: "$/lb"}
        - {symbol: "PL=F", name: "Platinum", unit: "$/oz"}
    agriculture:
      label: "Agriculture"
      symbols:
        - {symbol: "ZC=F", name: "Corn", unit: "¢/bu"}
        - {symbol: "ZW=F", name: "Wheat", unit: "¢/bu"}
        - {symbol: "ZS=F", name: "Soybeans", unit: "¢/bu"}
    etf_proxy:
      label: "ETF Proxies"
      symbols:
        - {symbol: "GLD", name: "SPDR Gold", unit: "$"}
        - {symbol: "USO", name: "US Oil Fund", unit: "$"}
        - {symbol: "DBC", name: "Invesco DB Commodity", unit: "$"}

